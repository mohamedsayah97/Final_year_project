apiVersion: v1
kind: ConfigMap
metadata:
  name: optima-manage-config
data:
  DB_TYPE: "postgres"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USERNAME: "postgres"
  DB_NAME: "optimanageDB"
  JWT_EXPIRE_IN: "1d"
  JWT_EXPIRES_IN: "3h"
  JWT_REFRESH_EXPIRES_IN: "100h"
  NODE_ENV: "production"
  PORT: "3000"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: optima-manage-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: optima-manage-backend
  template:
    metadata:
      labels:
        app: optima-manage-backend
    spec:
      containers:
        - name: optima-manage-backend
          image: optima-manage:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: optima-manage-config
            - secretRef:
                name: optima-manage-secret
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: optima-manage-backend
spec:
  selector:
    app: optima-manage-backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      name: http
  type: LoadBalancer
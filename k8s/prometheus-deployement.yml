apiVersion: v1
kind: ConfigMap
metadata:
  name: optima-manage-prometheus-config
  # Changé de prometheus-config à optima-manage-prometheus-config pour cohérence avec le projet
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      # Intervalle de scrape - demande les metrics toutes les 15 secondes
    scrape_configs:
      - job_name: 'optima-manage-backend-metrics'
        # Changé de nodejs-devops-demo-monitor à optima-manage-backend-metrics
        static_configs:
          - targets: ['optima-manage-backend:3000']
          # Changé de nodejs-devops-demo:3000 à optima-manage-backend:3000 pour pointer vers le bon service
        metrics_path: '/metrics'
        # metrics_path reste /metrics car c'est là que NestJS expose les métriques via prom-client
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: optima-manage-prometheus
  # Changé de prometheus à optima-manage-prometheus pour cohérence avec les autres services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: optima-manage-prometheus
      # Changé le label pour refléter le nom cohérent
  template:
    metadata:
      labels:
        app: optima-manage-prometheus
        # Changé le label de metadata pour correspondre au selector
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus
          # Ajouté :latest pour s'assurer d'avoir une version stable
          ports:
            - containerPort: 9090
              name: prometheus
              # Ajouté le nom du port
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              # Volume mount inchangé - c'est la bonne syntaxe pour charger le ConfigMap
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            # Ajouté health check pour vérifier que Prometheus fonctionne
      volumes:
        - name: config-volume
          configMap:
            name: optima-manage-prometheus-config
            # Changé de prometheus-config à optima-manage-prometheus-config pour correspondre au ConfigMap
---
apiVersion: v1
kind: Service
metadata:
  name: optima-manage-prometheus
  # Changé de prometheus à optima-manage-prometheus pour cohérence
spec:
  selector:
    app: optima-manage-prometheus
    # Changé le selector pour correspondre au deployment
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
      name: prometheus
      # Ajouté le nom du port
  type: NodePort
  # NodePort permet d'accéder à Prometheus depuis l'extérieur du cluster sur un port spécifique